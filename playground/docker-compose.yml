# Named project so this stack coexists with other Better Blocks stacks — the
# strapi-plugin-better-blocks playground (host :1337) and the React renderer
# playground (host :1338). Without a name, both renderer playgrounds default to
# the "playground" project and clash on container names.
name: better-blocks-astro-renderer

services:
  strapi:
    container_name: better-blocks-astro-renderer-strapi
    build:
      context: ..
      dockerfile: playground/strapi/Dockerfile
    ports:
      # Host :1339 to avoid clashing with the plugin (:1337) and React (:1338)
      # stacks. Container port stays 1337, so the internal `strapi:1337` DNS
      # (used by STRAPI_URL below) is unchanged.
      - '1339:1337'
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: dockerKey1,dockerKey2,dockerKey3,dockerKey4
      API_TOKEN_SALT: docker-api-token-salt
      ADMIN_JWT_SECRET: docker-admin-jwt-secret
      TRANSFER_TOKEN_SALT: docker-transfer-token-salt
      ENCRYPTION_KEY: docker-encryption-key
      JWT_SECRET: docker-jwt-secret
      DATABASE_CLIENT: sqlite
      DATABASE_FILENAME: .tmp/data.db

  astro-app:
    container_name: better-blocks-astro-renderer-astro-app
    build:
      context: ..
      dockerfile: playground/astro-app/Dockerfile
    ports:
      - '4321:4321'
    environment:
      STRAPI_URL: http://strapi:1337
    depends_on:
      - strapi
